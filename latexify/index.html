<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, onAuthStateChanged, updateProfile,
  setPersistence, browserLocalPersistence,
  PhoneAuthProvider, signInWithCredential, RecaptchaVerifier,
  signInWithPhoneNumber, updatePassword, GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAaezwe-pPDi1rsS3uFopk9JMY199LLoqk",
  authDomain:        "latexify-4bfc9.firebaseapp.com",
  projectId:         "latexify-4bfc9",
  storageBucket:     "latexify-4bfc9.firebasestorage.app",
  messagingSenderId: "292044762895",
  appId:             "1:292044762895:web:a7a0ed9489331e2e88d87a"
};

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);
await setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, user => {
  if(user) window.location.href = 'editor.html';
});

if(window.location.hash === '#register') switchTab('register');

function showErr(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function showOk(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.classList.add('show'); }
function hideMsg(id){ document.getElementById(id).classList.remove('show'); }
function setLoading(id,on){ const b=document.getElementById(id); b.disabled=on; b.innerHTML=on?'<span class="spinner"></span>Cargando...':b.dataset.orig||b.textContent; }
document.querySelectorAll('.btn').forEach(b=>b.dataset.orig=b.textContent);

let recaptchaVerifiers={};
let confirmationResults={};

function getRecaptcha(containerId){
  if(!recaptchaVerifiers[containerId]){
    recaptchaVerifiers[containerId]=new RecaptchaVerifier(containerId,{
      size:'normal',
      callback:()=>{},
      'expired-callback':()=>{ recaptchaVerifiers[containerId].clear(); recaptchaVerifiers[containerId]=null; }
    },auth);
    recaptchaVerifiers[containerId].render();
  }
  return recaptchaVerifiers[containerId];
}

// ── LOGIN EMAIL ──
window.doLogin = async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  hideMsg('login-error'); hideMsg('login-success');
  if(!email||!pass){ showErr('login-error','Completa todos los campos.'); return; }
  setLoading('login-btn',true);
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    showOk('login-success','¡Bienvenido! Redirigiendo...');
    setTimeout(()=>window.location.href='editor.html',800);
  }catch(e){
    const msgs={
      'auth/user-not-found':'No existe una cuenta con ese correo.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'Correo o contraseña incorrectos.',
      'auth/invalid-email':'Correo no válido.',
      'auth/too-many-requests':'Demasiados intentos. Espera un momento.'
    };
    showErr('login-error',msgs[e.code]||'Error al ingresar. Intenta de nuevo.');
  }
  setLoading('login-btn',false);
};

// ── LOGIN PHONE ──
window.sendLoginSMS = async function(){
  const prefix=document.getElementById('login-prefix').value.trim();
  const phone=document.getElementById('login-phone').value.trim();
  const full=prefix+phone;
  hideMsg('login-error');
  if(!phone){ showErr('login-error','Ingresa tu número de celular.'); return; }
  setLoading('login-phone-btn',true);
  try{
    const recaptcha=getRecaptcha('recaptcha-login');
    confirmationResults.login=await signInWithPhoneNumber(auth,full,recaptcha);
    document.getElementById('login-sms-step').style.display='block';
    showOk('login-success',`Código enviado a ${full}`);
  }catch(e){
    showErr('login-error','Error al enviar SMS: '+e.message);
    if(recaptchaVerifiers['recaptcha-login']) recaptchaVerifiers['recaptcha-login'].clear();
    recaptchaVerifiers['recaptcha-login']=null;
  }
  setLoading('login-phone-btn',false);
};

window.verifyLoginSMS = async function(){
  const code=document.getElementById('login-sms-code').value.trim();
  hideMsg('login-error');
  if(!code){ showErr('login-error','Ingresa el código.'); return; }
  try{
    await confirmationResults.login.confirm(code);
    showOk('login-success','¡Verificado! Redirigiendo...');
    setTimeout(()=>window.location.href='editor.html',800);
  }catch(e){
    showErr('login-error','Código incorrecto. Intenta de nuevo.');
  }
};

// ── GOOGLE SIGN IN ──
window.doGoogleLogin = async function(){
  try{
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const snap = await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()){
      await setDoc(doc(db,'users',user.uid),{
        name: user.displayName||'Usuario',
        email: user.email||'',
        plan:'free', premium:false,
        compilationsToday:0,
        compilationsDate:new Date().toDateString(),
        createdAt:serverTimestamp(), role:'user'
      });
    }
    window.location.href='editor.html';
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user'){
      showErr('login-error','Error al ingresar con Google: '+e.message);
    }
  }
};
</script>
